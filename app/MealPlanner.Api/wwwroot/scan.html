<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Сканування продукту | Meal Planner API</title>
    <link rel="stylesheet" href="css/site.css">
</head>
<body>
    <main class="page">
        <section class="hero">
            <p class="label">Meal Planner API</p>
            <h1>Сканування QR/штрихкоду продукту</h1>
            <div class="hero-actions">
                <a class="hero-link" href="index.html">Назад до API-клієнта</a>
            </div>
        </section>

        <section class="panel">
            <h2>1. Авторизація користувача</h2>
            <div id="authStatus" class="summary"></div>

            <div class="toolbar">
                <input id="authName" type="text" placeholder="Ім'я для реєстрації">
                <input id="authEmail" type="email" placeholder="Email">
                <input id="authPassword" type="password" placeholder="Пароль">
                <button type="button" onclick="registerApiUser()">Зареєструватися</button>
                <button type="button" onclick="loginApiUser()">Увійти</button>
                <button type="button" class="secondary" onclick="logoutApiUser()">Вийти</button>
            </div>

            <p id="authMessage"></p>
        </section>

        <section class="panel">
            <h2>2. Прив'язати код до продукту</h2>

            <div class="toolbar">
                <select id="foodSelect"></select>
                <input id="userIdInput" placeholder="UserId">
                <input id="codeValueInput" placeholder="QR/штрихкод">
                <select id="codeTypeInput">
                    <option value="Barcode">Barcode</option>
                    <option value="QR">QR</option>
                </select>
                <button onclick="createScanCode()">Прив'язати</button>
            </div>

            <p id="bindResult"></p>
        </section>

        <section class="panel">
            <h2>3. Сканувати код</h2>

            <div class="toolbar">
                <input id="scanInput" placeholder="Код вручну або з файлу">
                <button onclick="scanManualCode()">Знайти продукт</button>
                <button onclick="openFileScanner()">Завантажити QR/штрихкод з файлу</button>
            </div>

            <input id="fileInput" type="file" accept="image/*" style="display:none" onchange="scanPhotoCode(event)">
            <div id="scanResult"></div>
        </section>

        <section class="panel">
            <h2>4. Історія сканувань</h2>
            <button onclick="loadScanLogs()">Оновити історію</button>
            <table>
                <thead>
                    <tr>
                        <th>Код</th>
                        <th>Результат</th>
                        <th>Продукт</th>
                        <th>Джерело</th>
                        <th>Час</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script src="js/auth-client.js"></script>
    <script src="js/scan-code-api.js"></script>
</body>
</html>
